<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate BMI Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 1.5rem; font-weight: 600; letter-spacing: 1px; }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #475569;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ผลลัพธ์แบบล้ำๆ */
        #result-area {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .bmi-value {
            font-size: 3rem;
            font-weight: 700;
            margin: 0.5rem 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gauge Bar */
        .gauge {
            height: 8px;
            width: 100%;
            background: #334155;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }

        #gauge-progress {
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(90deg, #34d399, #fbbf24, #ef4444);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BMI CALCULATOR</h2>
    
    <div class="input-group">
        <label>ส่วนสูง (ซม.)</label>
        <input type="number" id="height" placeholder="เช่น 175" step="0.1">
    </div>

    <div class="input-group">
        <label>น้ำหนัก (กก.)</label>
        <input type="number" id="weight" placeholder="เช่น 70" step="0.1">
    </div>

    <button onclick="calculateBMI()">วิเคราะห์ผลลัพธ์</button>

    <div id="result-area">
        <div class="status-badge" id="bmi-status">ปกติ</div>
        <div class="bmi-value" id="bmi-num">22.5</div>
        <div class="gauge">
            <div id="gauge-progress"></div>
        </div>
        <p id="bmi-desc" style="color: #94a3b8; font-size: 0.85rem;"></p>
    </div>
</div>

<script>
    function calculateBMI() {
        const h = document.getElementById('height').value / 100;
        const w = document.getElementById('weight').value;
        const resultArea = document.getElementById('result-area');
        
        if (h > 0 && w > 0) {
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmi-num').innerText = bmi;
            
            let status = "";
            let color = "";
            let percent = 0;
            let desc = "";

            if (bmi < 18.5) {
                status = "น้ำหนักน้อยกว่าเกณฑ์";
                color = "#60a5fa";
                percent = 20;
                desc = "คุณควรรับประทานอาหารที่มีสารอาหารครบถ้วนมากขึ้นนะ";
            } else if (bmi < 23) {
                status = "น้ำหนักปกติ / สุขภาพดี";
                color = "#34d399";
                percent = 50;
                desc = "ยอดเยี่ยม! รักษาสมดุลนี้ไว้ให้ดีครับ";
            } else if (bmi < 25) {
                status = "น้ำหนักเกิน (ท้วม)";
                color = "#fbbf24";
                percent = 70;
                desc = "เริ่มมีพุงนิดๆ แล้วนะ ลองออกกำลังกายเพิ่มดูครับ";
            } else if (bmi < 30) {
                status = "อ้วน / โรคอ้วนระดับ 1";
                color = "#f97316";
                percent = 85;
                desc = "ควรเริ่มควบคุมอาหารและออกกำลังกายอย่างจริงจัง";
            } else {
                status = "อ้วนมาก / โรคอ้วนระดับ 2";
                color = "#ef4444";
                percent = 100;
                desc = "เพื่อสุขภาพที่ดี ควรปรึกษาผู้เชี่ยวชาญด้านโภชนาการ";
            }

            const statusBadge = document.getElementById('bmi-status');
            statusBadge.innerText = status;
            statusBadge.style.background = color + "22"; // Light bg
            statusBadge.style.color = color;
            statusBadge.style.border = `1px solid ${color}`;
            
            document.getElementById('gauge-progress').style.width = percent + "%";
            document.getElementById('gauge-progress').style.background = color;
            document.getElementById('bmi-desc').innerText = desc;
            
            resultArea.style.display = 'block';
        } else {
            alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ");
        }
    }
</script>

</body>
</html>
